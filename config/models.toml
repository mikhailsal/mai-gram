# ─────────────────────────────────────────────────────────────────────
# Format repair -- auxiliary model for fixing malformed template output
# ─────────────────────────────────────────────────────────────────────
# When a response passes Tier 1 regex sanitization but still fails
# template validation, this cheap model is called to fix structural
# formatting (XML tags, JSON braces) without modifying content.

[format_repair]
model = "google/gemini-3.1-flash-lite" # Routes to a capable free model
temperature = 0.0                      # Deterministic -- no creativity needed
max_tokens = 8192                      # Must be enough to reproduce the full response
enabled = true                         # Set to false to skip LLM repair tier
reasoning.effort = "none"              # Disable reasoning -- speed over quality

# ─────────────────────────────────────────────────────────────────────
# Tool configuration
# ─────────────────────────────────────────────────────────────────────
# Use "enabled" to allow ONLY listed tools (whitelist mode).
# Use "disabled" to block specific tools (blacklist mode).
# If both are set, "enabled" takes precedence.
# If neither is set, all tools are available.
#
# [tools]
# enabled = ["wiki_create", "wiki_edit", "wiki_read", "wiki_search"]
# disabled = ["search_messages", "get_messages_by_timerange"]

# ─────────────────────────────────────────────────────────────────────
# External MCP server configuration
# ─────────────────────────────────────────────────────────────────────
# Servers are loaded from the mcp_config_path JSON file (Cursor/Claude format).
# Only servers listed in external_servers are started and made available.

[mcp]
mcp_config_path = "~/.cursor/mcp.json"
external_servers = ["exa"]
